<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <!-- Inter Font — Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes"
    />
    <meta name="theme-color" content="#c09a5c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Shafar - Agendamento Inteligente</title>

    <!-- Tailwind CSS será carregado via PostCSS -->

    <!-- Import Calendar CSS -->
    <link
      rel="stylesheet"
      href="https://esm.sh/react-calendar@5.0.0/dist/Calendar.css"
    />

    <!-- Custom Calendar Styles -->
    <style>
      /* React-Calendar — tema escuro (painel de agendamento) */
      .react-calendar {
        border: none;
        border-radius: 0.75rem;
        background-color: transparent;
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
      }
      .react-calendar__tile {
        border-radius: 0.5rem;
        color: #e8e8e8;
        padding: 0.65rem 0.25rem;
        font-size: 0.8125rem;
        font-weight: 500;
      }
      .react-calendar__tile:disabled {
        background-color: transparent;
        color: #6b7280; /* gray-500 */
      }
      .react-calendar__tile--now {
        background: #374151; /* gray-700 */
        color: #e0e0e0;
      }
      .react-calendar__tile--now:enabled:hover,
      .react-calendar__tile--now:enabled:focus {
        background: #4b5563; /* gray-600 */
      }
      .react-calendar__tile--active,
      .react-calendar__tile--active:enabled:hover,
      .react-calendar__tile--active:enabled:focus {
        background: linear-gradient(135deg, #c8922a, #e0b453) !important;
        color: #0d0d0d !important;
        font-weight: 700;
      }
      .react-calendar__tile:enabled:hover,
      .react-calendar__tile:enabled:focus {
        background-color: #374151; /* gray-700 */
      }
      .react-calendar__navigation button {
        color: #c09a5c;
      }
      .react-calendar__navigation button:enabled:hover,
      .react-calendar__navigation button:enabled:focus {
        background-color: #374151; /* gray-700 */
      }
      .react-calendar__navigation button:disabled {
        color: #6b7280;
      }
      .react-calendar__month-view__weekdays__weekday {
        color: #e0e0e0;
        text-decoration: none;
      }
      .react-calendar__month-view__days__day--weekend {
        color: #fca5a5; /* red-300 for weekends */
      }
      .react-calendar__month-view__days__day--neighboringMonth {
        color: #6b7280; /* gray-500 for other month days */
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "react-router-dom": "https://esm.sh/react-router-dom@6.22.0",
          "date-fns": "https://esm.sh/date-fns@3.6.0",
          "date-fns/": "https://esm.sh/date-fns@3.6.0/",
          "react-calendar": "https://esm.sh/react-calendar@5.0.0",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
          "react/": "https://aistudiocdn.com/react@^19.2.0/"
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body class="bg-brand-dark">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
